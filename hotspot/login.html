<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Portal WiFi - SDN Sindangsari 02</title>
    <style>
        
        :root {
            --primary: #D32F2F; /* Merah SD */
            --primary-hover: #B71C1C;
            --bg-color: #f0f4f8;
            --text-dark: #333333;
            --text-muted: #777777;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            /* Pola background garis halus seperti buku tulis */
            background-image: radial-gradient(#d7e1ec 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #FFC107; 
        }

        .header .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .form-body {
            padding: 30px 25px;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

                .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container input {
            padding-right: 45px; 
        }

        .toggle-icon {
            position: absolute;
            right: 15px;
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .toggle-icon:hover {
            opacity: 1;
        }
        /* --------------------------------------------------- */

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .free-trial {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .free-trial a {
            color: var(--primary);
            font-weight: bold;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #999;
            background: #fdfdfd;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>
    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="login-card">
        <div class="header">
            <div class="logo-icon">🏫</div>
            <h1>SDN SINDANGSARI 02</h1>
            <p>Portal Akses WiFi Sekolah</p>
        </div>

        <div class="form-body">
            
            $(if error)
            <div class="alert-error">
                $(error)
            </div>
            $(endif)

            <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />

                <div class="input-group">
                    <label>Username</label>
                    <input name="username" type="text" value="$(username)" placeholder="Masukkan Username..." required autocomplete="off" />
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-container">
                        <input id="password-field" name="password" type="password" placeholder="Masukkan Password..." required />
                        <span class="toggle-icon" onclick="togglePassword()" title="Tampilkan/Sembunyikan Password">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Masuk ke Jaringan</button>
            </form>

            $(if trial == 'yes')
            <div class="free-trial">
                Akses internet gratis (Guest), <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)">klik di sini</a>.
            </div>
            $(endif)

        </div>

        <div class="footer">
            Powered by SDN SINDANGSARI 02
        </div>
    </div>

    <script>
        function togglePassword() {
            var input = document.getElementById("password-field");
            var icon = document.querySelector(".toggle-icon");
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "🙈"; 
            } else {
                input.type = "password";
                icon.textContent = "👁️"; 
            }
        }
    </script>

</body>
</html>
